<div>
  <h1>Dashboard</h1>
  <form (submit)="onSubmit()">
    <mat-form-field>
      <mat-label>Name</mat-label>
      <input matInput type="text" required [(ngModel)]="name" name="name" (change)="onNameChange($event)" />
    </mat-form-field>
    <mat-form-field>
      <mat-label>Email</mat-label>
      <input matInput type="email" required [(ngModel)]="email" name="email" (change)="onEmailChange($event)" />
    </mat-form-field>
    <button mat-raised-button color="primary">Submit</button>
  </form>
</div>
